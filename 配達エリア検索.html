<html lang="ja">
<head>
  <meta charset="UTF-8">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 40px 36px 36px;
      max-width: 540px;
      width: 100%;
    }
    .card h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a2a40;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card h1 .icon { font-size: 1.6rem; }
    .subtitle {
      color: #6b7a8d;
      font-size: 0.87rem;
      margin-bottom: 28px;
    }
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      align-items: center;
    }
    .postal-group {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
    }
    .postal-group span {
      color: #555;
      font-size: 1.1rem;
      font-weight: bold;
      flex-shrink: 0;
    }
    .part1, .part2 {
      border: 2px solid #d0d8e4;
      border-radius: 8px;
      font-size: 1.15rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
      background: #f8fafc;
      text-align: center;
      letter-spacing: 2px;
    }
    .part1 { width: 80px; }
    .part2 { width: 100px; flex: 1; }
    .part1:focus, .part2:focus { border-color: #3b82f6; background: #fff; }
    .btn {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn:hover { background: #1d4ed8; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .result-box {
      border-radius: 12px;
      padding: 22px 24px;
      font-size: 1rem;
      display: none;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
    .result-box.ok {
      background: #ecfdf5;
      border: 1.5px solid #10b981;
    }
    .result-box.ng {
      background: #fff1f2;
      border: 1.5px solid #ef4444;
    }
    .result-box.unknown {
      background: #fffbeb;
      border: 1.5px solid #f59e0b;
    }
    .result-label {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .result-box.ok .result-label { color: #047857; }
    .result-box.ng .result-label { color: #b91c1c; }
    .result-box.unknown .result-label { color: #b45309; }
    .info-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px 14px;
      font-size: 0.93rem;
      color: #374151;
    }
    .info-label { color: #6b7a8d; font-size: 0.85rem; }
    .info-value { font-weight: 600; }
    .store-badge {
      display: inline-block;
      background: #dbeafe;
      color: #1e40af;
      border-radius: 6px;
      padding: 3px 10px;
      font-weight: 700;
      font-size: 0.95rem;
    }
    .error-msg {
      color: #ef4444;
      font-size: 0.87rem;
      margin-top: -14px;
      margin-bottom: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1><span class="icon">📦</span>配達エリア検索</h1>
    <p class="subtitle">郵便番号を入力して、配達可能エリアかどうかを確認できます</p>

    <div class="input-row">
      <div class="postal-group">
        <span>〒</span>
        <input type="text" id="part1" class="part1" placeholder="000" maxlength="3" inputmode="numeric">
        <span style="color:#aaa">−</span>
        <input type="text" id="part2" class="part2" placeholder="0000" maxlength="4" inputmode="numeric">
      </div>
      <button class="btn" onclick="checkDelivery()">判定</button>
    </div>
    <p id="errMsg" class="error-msg">郵便番号は 000-0000 形式で入力してください</p>

    <div id="result" class="result-box"></div>
  </div>

  const part1 = document.getElementById('part1');
  const part2 = document.getElementById('part2');

  // Auto-advance on part1 filled
  part1.addEventListener('input', () => {
    part1.value = part1.value.replace(/[^0-9]/g, '');
    if (part1.value.length === 3) part2.focus();
  });
  part2.addEventListener('input', () => {
    part2.value = part2.value.replace(/[^0-9]/g, '');
  });
  part2.addEventListener('keydown', e => {
    if (e.key === 'Enter') checkDelivery();
  });
  part1.addEventListener('keydown', e => {
    if (e.key === 'Enter') checkDelivery();
  });

  function checkDelivery() {
    const p1 = part1.value.trim();
    const p2 = part2.value.trim();
    const errMsg = document.getElementById('errMsg');
    const resultBox = document.getElementById('result');

    if (p1.length !== 3 || p2.length !== 4 || isNaN(p1) || isNaN(p2)) {
      errMsg.style.display = 'block';
      resultBox.style.display = 'none';
      return;
    }
    errMsg.style.display = 'none';

    const code = p1 + p2;
    const entry = DATA[code];

    resultBox.className = 'result-box';
    resultBox.style.display = 'block';

    // Force reflow for animation
    void resultBox.offsetWidth;

    if (!entry) {
      resultBox.classList.add('unknown');
      resultBox.innerHTML = `
        <div class="result-label">⚠️ データなし</div>
        <div style="color:#92400e; font-size:0.93rem;">〒${p1}-${p2} はデータベースに存在しません。<br>郵便番号をご確認ください。</div>
      `;
    } else if (!entry.s) {
      resultBox.classList.add('ng');
      resultBox.innerHTML = `
        <div class="result-label">❌ 配達不可</div>
        <div class="info-grid">
          <span class="info-label">郵便番号</span><span class="info-value">〒${p1}-${p2}</span>
          <span class="info-label">都道府県</span><span class="info-value">${entry.p}</span>
          <span class="info-label">市区町村</span><span class="info-value">${entry.c}</span>
          <span class="info-label">町域</span><span class="info-value">${entry.t}</span>
          <span class="info-label">住所</span><span class="info-value">${entry.p}${entry.c}${entry.t}</span>
        </div>
      `;
    } else {
      resultBox.classList.add('ok');
      resultBox.innerHTML = `
        <div class="result-label">✅ 配達可能</div>
        <div class="info-grid">
          <span class="info-label">郵便番号</span><span class="info-value">〒${p1}-${p2}</span>
          <span class="info-label">都道府県</span><span class="info-value">${entry.p}</span>
          <span class="info-label">市区町村</span><span class="info-value">${entry.c}</span>
          <span class="info-label">町域</span><span class="info-value">${entry.t}</span>
          <span class="info-label">住所</span><span class="info-value">${entry.p}${entry.c}${entry.t}</span>
          <span class="info-label">担当店舗</span><span class="info-value"><span class="store-badge">${entry.s}</span></span>
        </div>
      `;
    }
  }
